name: darwin-arm64

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  actions: write

jobs:
  darwin-arm64:
    strategy:
      fail-fast: false
      matrix:
        cmake_preset: [darwin-gcc-arm64, darwin-clang-arm64]
        build_type: [Debug, Release, RelWithDebInfo, MinSizeRel]
        build_shared: [ON, OFF]
        use_blas_lapack: [OpenBLAS]
        use_boost_unordered: [ON]

    runs-on: macos-15
    name: ${{ matrix.cmake_preset }}.${{ matrix.build_type }}.build-shared-${{ matrix.build_shared }}.boost-unordered-${{ matrix.use_boost_unordered }}.blas-lapack-${{ matrix.use_blas_lapack }}
    env:
      GCC_VERSION: "15"
      CLANG_VERSION: "22"

    steps:
      - name: Checkout repository
        id: checkout-repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install gcc prerequisites on macOS
        id: install-prerequisites-darwin-gcc
        if: matrix.cmake_preset == 'darwin-gcc-arm64'
        run: |
          ln -sf $(brew --prefix)/bin/gcc-${{ env.GCC_VERSION }} $(brew --prefix)/bin/gcc
          ln -sf $(brew --prefix)/bin/g++-${{ env.GCC_VERSION }} $(brew --prefix)/bin/g++
          ln -sf $(brew --prefix)/bin/gfortran-${{ env.GCC_VERSION }} $(brew --prefix)/bin/gfortran
        shell: bash

      - name: Install clang prerequisites on macOS
        id: install-prerequisites-darwin-clang
        if: matrix.cmake_preset == 'darwin-clang-arm64'
        run: |
          brew install llvm@${{ env.CLANG_VERSION }} libomp flang
          _HOMEBREW_LLVM_PREFIX=$(brew --prefix llvm@${{ env.CLANG_VERSION }})
          _HOMEBREW_LIBOMP_PREFIX=$(brew --prefix libomp)
          _HOMEBREW_FLANG_PREFIX=$(brew --prefix flang)
          echo "${_HOMEBREW_LLVM_PREFIX}/bin" >> $GITHUB_PATH
          echo "${_HOMEBREW_FLANG_PREFIX}/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=${_HOMEBREW_LLVM_PREFIX}:${_HOMEBREW_LIBOMP_PREFIX}:${_HOMEBREW_FLANG_PREFIX}" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          unset _HOMEBREW_LLVM_PREFIX
          unset _HOMEBREW_LIBOMP_PREFIX
          unset _HOMEBREW_FLANG_PREFIX
        shell: bash

      - name: Setup vcpkg
        id: setup-vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Install latest CMake and Ninja
        id: install-cmake
        uses: lukka/get-cmake@latest

      - name: Setup ccache
        id: setup-ccache
        uses: Chocobo1/setup-ccache-action@v1
        with:
          store_cache: false
          restore_cache: false
          remove_stale_cache: true
          override_cache_key: ccache_${{ matrix.cmake_preset }}_${{ matrix.build_type }}_build-shared-${{ matrix.build_shared }}_boost-unordered-${{ matrix.use_boost_unordered }}_blas-lapack-${{ matrix.use_blas_lapack }}

      - name: Run CMake consuming CMakePresets.json for ${{ matrix.cmake_preset }} ${{ matrix.build_type }}
        id: run-cmake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.cmake_preset }}
          configurePresetAdditionalArgs: "['-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}', '-DBUILD_SHARED_LIBS=${{ matrix.build_shared }}', '-DBOYLE_USE_BOOST_UNORDERED=${{ matrix.use_boost_unordered }}', '-DBOYLE_USE_BLAS_LAPACK=${{ matrix.use_blas_lapack }}']"
          buildPreset: ${{ matrix.cmake_preset }}
          buildPresetAdditionalArgs: "[]"
          testPreset: ${{ matrix.cmake_preset }}
          testPresetAdditionalArgs: "[]"
