name: gcc

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  C_COMPILER: /usr/bin/gcc-13
  C_FLAGS: -march=native
  CXX_COMPILER: /usr/bin/g++-13
  CXX_FLAGS: -march=native

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install boost
      id: install-boost
      uses: MarkusJx/install-boost@v2.4.4
      with:
        boost_version: 1.83.0
        platform_version: 22.04
        toolset: gcc
        link: static+shared
        arch: x86

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -S . -B ${{github.workspace}}/out/build/gcc-linux_x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_C_COMPILER=${{env.C_COMPILER}} -DCMAKE_C_FLAGS=${{env.C_FLAGS}} -DCMAKE_CXX_COMPILER=${{env.CXX_COMPILER}} -DCMAKE_CXX_FLAGS=${{env.CXX_FLAGS}}
      env:
        BOOST_ROOT: ${{steps.install-boost.outputs.BOOST_ROOT}}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/out/build/gcc-linux_x64 --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/out/build/gcc-linux_x64
      # Execute tests defined by the CMake configuration.
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -C ${{env.BUILD_TYPE}}
